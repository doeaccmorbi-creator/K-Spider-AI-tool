<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>K Spider AI — Admin Panel</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:#f0f4f9;color:#1a2332;min-height:100vh;}
.header{background:#0b2545;color:white;padding:16px 32px;display:flex;align-items:center;justify-content:space-between;}
.logo{font-size:18px;font-weight:700;display:flex;align-items:center;gap:8px;}
.admin-badge{background:rgba(244,168,50,0.2);border:1px solid rgba(244,168,50,0.4);color:#f4a832;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:700;}
.main{max-width:1200px;margin:0 auto;padding:24px 32px;}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px;}
.stat-card{background:white;border-radius:12px;padding:20px;box-shadow:0 1px 4px rgba(0,0,0,0.06);}
.stat-num{font-size:28px;font-weight:700;color:#0b2545;}
.stat-label{font-size:12px;color:#64748b;margin-top:4px;}
.card{background:white;border-radius:12px;padding:24px;box-shadow:0 1px 4px rgba(0,0,0,0.06);margin-bottom:20px;}
.card-title{font-size:16px;font-weight:700;color:#0b2545;margin-bottom:16px;display:flex;align-items:center;gap:8px;}
table{width:100%;border-collapse:collapse;font-size:13px;}
th{text-align:left;padding:10px 12px;font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:0.5px;border-bottom:2px solid #f0f4f9;}
td{padding:12px;border-bottom:1px solid #f8fafc;vertical-align:middle;}
tr:hover td{background:#f8fafc;}
.badge{display:inline-block;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:700;}
.badge-trial{background:#fef9c3;color:#854d0e;}
.badge-active{background:#dcfce7;color:#166534;}
.badge-expired{background:#fee2e2;color:#991b1b;}
.badge-suspended{background:#f1f5f9;color:#475569;}
.badge-basic{background:#e0e7ff;color:#3730a3;}
.badge-pro{background:#d1fae5;color:#065f46;}
.badge-premium{background:#fef3c7;color:#92400e;}
.btn{padding:6px 12px;border-radius:7px;border:none;cursor:pointer;font-size:12px;font-weight:600;font-family:'DM Sans',sans-serif;transition:all 0.15s;}
.btn-activate{background:#dcfce7;color:#166534;}
.btn-activate:hover{background:#bbf7d0;}
.btn-suspend{background:#fee2e2;color:#991b1b;}
.btn-suspend:hover{background:#fecaca;}
.btn-upgrade{background:#e0e7ff;color:#3730a3;}
.btn-upgrade:hover{background:#c7d2fe;}
.btn-primary{background:#0b2545;color:white;padding:10px 20px;font-size:13px;}
.btn-primary:hover{background:#13315c;}
.search-bar{display:flex;gap:10px;margin-bottom:16px;}
.search-input{flex:1;padding:10px 14px;border:1px solid #e2e8f0;border-radius:8px;font-size:13px;font-family:'DM Sans',sans-serif;outline:none;}
.search-input:focus{border-color:#1a6eb5;box-shadow:0 0 0 3px rgba(26,110,181,0.1);}
.loading{text-align:center;padding:40px;color:#64748b;}
.add-form{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.field label{font-size:11px;font-weight:600;color:#64748b;display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:0.3px;}
.field input,.field select{width:100%;padding:9px 12px;border:1px solid #e2e8f0;border-radius:8px;font-size:13px;font-family:'DM Sans',sans-serif;outline:none;}
.field input:focus,.field select:focus{border-color:#1a6eb5;}
@media(max-width:768px){.stats-row{grid-template-columns:1fr 1fr;}.add-form{grid-template-columns:1fr;}.main{padding:16px;}}
</style>
</head>
<body>
<div class="header">
  <div class="logo">🕷️ K Spider AI <span class="admin-badge">ADMIN PANEL</span></div>
  <div style="display:flex;align-items:center;gap:12px;">
    <div id="admin-name" style="font-size:13px;color:rgba(255,255,255,0.7);"></div>
    <button onclick="doSignOut()" class="btn" style="background:rgba(255,255,255,0.1);color:white;border:1px solid rgba(255,255,255,0.2);">Sign Out</button>
  </div>
</div>

<div class="main">
  <div id="auth-check" class="loading">Verifying admin access...</div>
  <div id="admin-content" style="display:none;">
    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-card"><div class="stat-num" id="st-total">—</div><div class="stat-label">Total Doctors</div></div>
      <div class="stat-card"><div class="stat-num" id="st-active">—</div><div class="stat-label">Active</div></div>
      <div class="stat-card"><div class="stat-num" id="st-trial">—</div><div class="stat-label">Trial</div></div>
      <div class="stat-card"><div class="stat-num" id="st-revenue">—</div><div class="stat-label">Est. Revenue</div></div>
    </div>

    <!-- Add Doctor Manually -->
    <div class="card">
      <div class="card-title">➕ Add / Activate Doctor Manually</div>
      <div class="add-form">
        <div class="field"><label>Doctor Name</label><input id="ad-name" placeholder="Dr. Full Name"></div>
        <div class="field"><label>Email</label><input id="ad-email" type="email" placeholder="doctor@email.com"></div>
        <div class="field"><label>Qualification</label><select id="ad-qual"><option>MBBS</option><option>MD</option><option>BDS</option><option>BAMS</option><option>BHMS</option><option>MS</option><option>DM</option><option>DNB</option></select></div>
        <div class="field"><label>Plan</label><select id="ad-plan"><option value="basic">Basic — ₹1,499/yr</option><option value="pro" selected>Pro — ₹2,999/yr</option><option value="premium">Premium — ₹4,999/yr</option></select></div>
      </div>
      <button class="btn btn-primary" style="margin-top:16px;" onclick="addDoctor()">Create & Activate Account</button>
    </div>

    <!-- Doctors Table -->
    <div class="card">
      <div class="card-title">👨‍⚕️ All Registered Doctors</div>
      <div class="search-bar">
        <input class="search-input" id="doctor-search" placeholder="Search by name or email..." oninput="filterDoctors()">
        <button class="btn btn-primary" onclick="loadDoctors()">🔄 Refresh</button>
      </div>
      <div id="doctors-table"><div class="loading">Loading doctors...</div></div>
    </div>
  </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID",
  storageBucket: "YOUR_PROJECT.appspot.com",
  messagingSenderId: "YOUR_SENDER_ID",
  appId: "YOUR_APP_ID"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// ADMIN EMAIL — Only this email can access admin panel
const ADMIN_EMAIL = 'shreyanshraval@gmail.com'; // Change to your actual email

let allDoctors = [];

auth.onAuthStateChanged(async (user) => {
  if (!user || user.email !== ADMIN_EMAIL) {
    document.getElementById('auth-check').innerHTML = '❌ Access denied. Admin only.';
    return;
  }
  document.getElementById('auth-check').style.display = 'none';
  document.getElementById('admin-content').style.display = 'block';
  document.getElementById('admin-name').textContent = user.email;
  loadDoctors();
});

async function loadDoctors() {
  document.getElementById('doctors-table').innerHTML = '<div class="loading">Loading...</div>';
  try {
    const snap = await db.collection('doctors').orderBy('createdAt', 'desc').get();
    allDoctors = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    updateStats();
    renderTable(allDoctors);
  } catch(e) {
    document.getElementById('doctors-table').innerHTML = '<div class="loading">Error: ' + e.message + '</div>';
  }
}

function updateStats() {
  document.getElementById('st-total').textContent = allDoctors.length;
  document.getElementById('st-active').textContent = allDoctors.filter(d => d.status === 'active').length;
  document.getElementById('st-trial').textContent = allDoctors.filter(d => d.status === 'trial').length;
  const revenue = allDoctors
    .filter(d => d.status === 'active')
    .reduce((s, d) => s + ({basic:1499,pro:2999,premium:4999}[d.plan] || 0), 0);
  document.getElementById('st-revenue').textContent = '₹' + revenue.toLocaleString('en-IN');
}

function renderTable(doctors) {
  if (!doctors.length) {
    document.getElementById('doctors-table').innerHTML = '<div class="loading">No doctors found.</div>';
    return;
  }
  const rows = doctors.map(d => {
    const created = d.createdAt?.toDate ? d.createdAt.toDate().toLocaleDateString('en-IN') : '—';
    const trialEnd = d.trialEndsAt?.toDate ? d.trialEndsAt.toDate().toLocaleDateString('en-IN') : '—';
    return `<tr>
      <td><strong>${d.name || '—'}</strong><br><span style="font-size:11px;color:#64748b;">${d.qual || ''}</span></td>
      <td style="font-size:12px;">${d.email || '—'}</td>
      <td><span class="badge badge-${d.plan || 'basic'}">${d.plan || 'basic'}</span></td>
      <td><span class="badge badge-${d.status || 'trial'}">${d.status || 'trial'}</span></td>
      <td style="font-size:11px;color:#64748b;">${created}</td>
      <td style="font-size:11px;color:#64748b;">${d.rxCount || 0} / ${d.rxLimit || 50}</td>
      <td>
        ${d.status !== 'active' ? `<button class="btn btn-activate" onclick="updateStatus('${d.id}','active')">Activate</button>` : ''}
        ${d.status !== 'suspended' ? `<button class="btn btn-suspend" onclick="updateStatus('${d.id}','suspended')" style="margin-left:4px;">Suspend</button>` : ''}
        <select onchange="updatePlan('${d.id}',this.value)" style="margin-left:4px;padding:4px 8px;border:1px solid #e2e8f0;border-radius:6px;font-size:11px;font-family:'DM Sans',sans-serif;">
          <option value="">Change Plan</option>
          <option value="basic">Basic</option>
          <option value="pro">Pro</option>
          <option value="premium">Premium</option>
        </select>
      </td>
    </tr>`;
  }).join('');
  document.getElementById('doctors-table').innerHTML = `
    <table>
      <thead><tr>
        <th>Doctor</th><th>Email</th><th>Plan</th><th>Status</th><th>Joined</th><th>Rx Used</th><th>Actions</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

function filterDoctors() {
  const q = document.getElementById('doctor-search').value.toLowerCase();
  const filtered = allDoctors.filter(d =>
    (d.name||'').toLowerCase().includes(q) || (d.email||'').toLowerCase().includes(q)
  );
  renderTable(filtered);
}

async function updateStatus(uid, status) {
  try {
    await db.collection('doctors').doc(uid).update({ status });
    await loadDoctors();
  } catch(e) { alert('Error: ' + e.message); }
}

async function updatePlan(uid, plan) {
  if (!plan) return;
  const limits = { basic: 50, pro: 200, premium: 999999 };
  try {
    await db.collection('doctors').doc(uid).update({ plan, rxLimit: limits[plan], status: 'active' });
    await loadDoctors();
  } catch(e) { alert('Error: ' + e.message); }
}

async function addDoctor() {
  const name = document.getElementById('ad-name').value.trim();
  const email = document.getElementById('ad-email').value.trim();
  const qual = document.getElementById('ad-qual').value;
  const plan = document.getElementById('ad-plan').value;
  if (!name || !email) { alert('Please enter name and email'); return; }
  const limits = { basic: 50, pro: 200, premium: 999999 };
  try {
    // Create a placeholder doc (doctor will register with this email)
    const ref = db.collection('pending_doctors').doc();
    await ref.set({ name, email, qual, plan, status: 'pending', rxLimit: limits[plan], rxCount: 0, createdBy: 'admin', createdAt: firebase.firestore.FieldValue.serverTimestamp() });
    alert('✅ Doctor record created! Ask them to register at kspiderai.in/doctor-login with this email. Their account will auto-activate.');
    document.getElementById('ad-name').value = '';
    document.getElementById('ad-email').value = '';
  } catch(e) { alert('Error: ' + e.message); }
}

async function doSignOut() {
  await auth.signOut();
  window.location.reload();
}
</script>
</body>
</html>
